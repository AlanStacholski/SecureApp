name: Security Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ============================================================
  # 1. Secrets scanning — Gitleaks
  # ============================================================
  secrets-scan:
    name: 🔍 Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ============================================================
  # 2. Dependency CVE check — pip-audit
  # ============================================================
  dependency-check:
    name: 📦 Dependency CVE Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit -r backend/requirements.txt --ignore-vuln GHSA-jfh8-c2jp-5drf

  # ============================================================
  # 3. SAST — Semgrep sem token
  # ============================================================
  sast:
    name: 🛡️ SAST Semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/python \
            --config p/owasp-top-ten \
            --config p/secrets \
            --error \
            backend/app/
        env:
          SEMGREP_APP_TOKEN: ""

  # ============================================================
  # 4. Security lint — Bandit
  # ============================================================
  bandit:
    name: 🔒 Bandit Security Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: bandit -r backend/app/ -ll

  # ============================================================
  # 5. Docker build + Trivy
  # ============================================================
  docker-scan:
    name: 🐳 Docker Build + Container Scan
    runs-on: ubuntu-latest
    needs: [dependency-check, sast, bandit]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t secureapp-backend:test ./backend

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: secureapp-backend:test
          format: table
          exit-code: 0
          severity: CRITICAL
          ignore-unfixed: true